[Rainmeter]
Update=1000
Author=RainTux
Name=Minimal
Description=Phase-1 demo: CPU, RAM, disk, time, bar, shape.

[Variables]
Accent=200,120,80,255
Pad=12

[mCPU]
Type=CPU

[mRAM]
Type=PhysicalMemory

[mDisk]
Type=FreeDisk
Drive=C:

[mTime]
Type=Time
Format=%Y-%m-%d %H:%M:%S

[MeterBackdrop]
Meter=Shape
X=#Pad#
Y=#Pad#
W=280
H=110
Shape=Rectangle 0,0,280,110
Fill=Fill Color 30,30,35,220

[MeterTitle]
Meter=String
X=#Pad#
Y=#Pad#
FontSize=14
FontFace=Sans
FontColor=#Accent#
String=RainTux · Minimal

[MeterTime]
Meter=String
MeasureName=mTime
X=#Pad#
Y=6B
FontSize=11
FontColor=220,220,220,255
String=[mTime]

[MeterCPU]
Meter=String
MeasureName=mCPU
X=#Pad#
Y=4B
FontSize=11
FontColor=255,255,255,255
String=CPU: [mCPU]%

[MeterRAM]
Meter=String
MeasureName=mRAM
X=140
Y=52
FontSize=11
FontColor=255,255,255,255
String=RAM: [mRAM]%

[MeterDiskBar]
Meter=Bar
MeasureName=mDisk
X=#Pad#
Y=78
W=250
H=10
BarOrientation=Horizontal
SolidColor=40,40,45,200
BarColor=#Accent#
